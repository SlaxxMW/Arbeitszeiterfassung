<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#A1C51D" />
  <title>Arbeitszeiterfassung DEV</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="../icons/icon-192.png" />
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#efefef;color:#111;display:grid;place-items:center;min-height:100vh;padding:24px}
    .box{max-width:560px;background:#fff;border:2px solid #222;border-radius:18px;padding:18px;box-shadow:0 10px 28px rgba(0,0,0,.12)}
    h1{margin:0 0 8px;font-size:22px}.small{color:#555;line-height:1.45}.err{white-space:pre-wrap;color:#a40000;margin-top:12px}
  </style>
</head>
<body>
  <div class="box">
    <h1>Arbeitszeiterfassung DEV</h1>
    <div class="small">Lade getrennte Test-App. Root-App bleibt unverändert.</div>
    <div class="err" id="err"></div>
  </div>
  <script>
  (async function(){
    const err = document.getElementById('err');
    try{
      const res = await fetch('../index.html?t=' + Date.now(), {cache:'no-store'});
      if(!res.ok) throw new Error('Original-App konnte nicht geladen werden: HTTP ' + res.status);
      let html = await res.text();

      const devCss = `\n<style>\n.dev-banner{position:sticky;top:0;z-index:10000;background:#ffd84d;color:#111;border-bottom:2px solid #111;text-align:center;font-weight:900;padding:8px 10px;font-size:14px}\n</style>\n`;
      html = html.replace('<title>Arbeitszeiterfassung</title>', '<title>Arbeitszeiterfassung DEV</title>');
      html = html.replace('<link rel="manifest" href="manifest.webmanifest" />', '<link rel="manifest" href="manifest.webmanifest" />');
      html = html.replace('<link rel="icon" href="icons/icon-192.png" />', '<link rel="icon" href="../icons/icon-192.png" />');
      html = html.replace('</head>', devCss + '</head>');
      html = html.replace('<body>', '<body><div class="dev-banner">TESTAPP · getrennte Datenbank · getrennte Installation · alte JSON-Backups hier gefahrlos testen</div>');
      html = html.replace('<div class="app-title">Arbeitszeiterfassung</div>', '<div class="app-title">Arbeitszeiterfassung DEV</div>');
      html = html.replace("const DB_NAME = 'az_pwa_db';", "const DB_NAME = 'az_pwa_db_dev';");
      html = html.replace("const VERSION_FALLBACK = '1.6.4g';", "const VERSION_FALLBACK = '1.6.4g-dev1';");
      html = html.replace("const swUrl = baseScope + 'sw.js?ver=1.6.4g';", "const swUrl = baseScope + 'sw.js?ver=1.6.4g-dev1';");

      document.open();
      document.write(html);
      document.close();
    }catch(e){
      err.textContent = e && e.stack ? e.stack : String(e);
    }
  })();
  </script>
</body>
</html>
