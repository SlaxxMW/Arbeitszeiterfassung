<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#A1C51D" />
  <title>Arbeitszeiterfassung DEV</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="../icons/icon-192.png" />
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#efefef;color:#111;display:grid;place-items:center;min-height:100vh;padding:24px}
    .box{max-width:560px;background:#fff;border:2px solid #222;border-radius:18px;padding:18px;box-shadow:0 10px 28px rgba(0,0,0,.12)}
    h1{margin:0 0 8px;font-size:22px}.small{color:#555;line-height:1.45}.err{white-space:pre-wrap;color:#a40000;margin-top:12px}
  </style>
</head>
<body>
  <div class="box">
    <h1>Arbeitszeiterfassung DEV</h1>
    <div class="small">Lade getrennte Test-App. Root-App bleibt unverändert.</div>
    <div class="err" id="err"></div>
  </div>
  <script>
  (async function(){
    const err = document.getElementById('err');
    const DEV_VERSION = '1.6.4g-dev4-update-notice';
    function mustReplace(html, search, replacement, label){
      const before = html;
      html = html.replace(search, replacement);
      if(before === html) throw new Error('DEV-Patch fehlgeschlagen: ' + label);
      return html;
    }
    try{
      const res = await fetch('../index.html?t=' + Date.now(), {cache:'no-store'});
      if(!res.ok) throw new Error('Original-App konnte nicht geladen werden: HTTP ' + res.status);
      let html = await res.text();

      const devCss = `\n<style>\n.dev-banner{position:sticky;top:0;z-index:10000;background:#ffd84d;color:#111;border-bottom:2px solid #111;text-align:center;font-weight:900;padding:8px 10px;font-size:14px}\n.az-update-overlay{position:fixed;inset:0;z-index:20000;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;padding:16px}\n.az-update-card{max-width:560px;width:100%;background:#fff;border:4px solid #C4111F;border-radius:18px;padding:18px;box-shadow:0 16px 44px rgba(0,0,0,.35);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}\n.az-update-card h2{margin:0 0 8px;font-size:24px}.az-update-card p{margin:8px 0;line-height:1.45}.az-update-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.az-update-actions button{border-radius:12px;border:1px solid #999;padding:10px 12px;font-weight:900}.az-update-primary{background:#8DAB18;border-color:#6E8712!important;color:#111}.az-update-muted{background:#f5f5f5}\n</style>\n`;
      html = html.replace('<title>Arbeitszeiterfassung</title>', '<title>Arbeitszeiterfassung DEV</title>');
      html = html.replace('<link rel="icon" href="icons/icon-192.png" />', '<link rel="icon" href="../icons/icon-192.png" />');
      html = html.replace('</head>', devCss + '</head>');
      html = html.replace('<body>', '<body><div class="dev-banner">TESTAPP · getrennte Datenbank · wöchentliche Sollzeit DEV · Update-Hinweis DEV · alte JSON-Backups hier gefahrlos testen</div>');
      html = html.replace('<div class="app-title">Arbeitszeiterfassung</div>', '<div class="app-title">Arbeitszeiterfassung DEV</div>');
      html = mustReplace(html, "const DB_NAME = 'az_pwa_db';", "const DB_NAME = 'az_pwa_db_dev';", 'eigene DEV IndexedDB');
      html = html.replace("const swUrl = baseScope + 'sw.js?ver=1.6.4g';", "const swUrl = baseScope + 'sw.js?ver=" + DEV_VERSION + "';");

      // UI: neue Einstellung additiv einfügen.
      html = mustReplace(html,
`        <div class="form-row">
          <label>Startsaldo Jahr (Stunden)</label>`,
`        <div class="form-row">
          <label>Wöchentliche Sollzeit</label>
          <input type="number" id="setWeeklySollHours" min="0" max="80" step="0.25" />
          <div class="small">Standard: 40 h/Woche. Die App verteilt den Wert auf Montag–Freitag. Beispiel: 30 h/Woche = 6 h Soll pro Werktag. Bereits eingetragene Zeiten werden beim Speichern automatisch neu berechnet, ohne Tagesdaten zu verändern.</div>
        </div>

        <div class="form-row">
          <label>Startsaldo Jahr (Stunden)</label>`, 'UI Feld wöchentliche Sollzeit');

      // JS: Elementreferenz.
      html = mustReplace(html,
"    const $setVacationPerYear = els('setVacationPerYear');",
"    const $setVacationPerYear = els('setVacationPerYear');\n    const $setWeeklySollHours = els('setWeeklySollHours');",
'Elementreferenz weeklySoll');

      // JS: Normalisierer nach getYearStartSaldoKey einfügen.
      html = mustReplace(html,
"    function getYearStartSaldoKey(year){ return `yearStartSaldo_${year}`; }",
"    function getYearStartSaldoKey(year){ return `yearStartSaldo_${year}`; }\n\n    function normalizeWeeklySollHours(value){\n      const n = Number(value);\n      if(!Number.isFinite(n) || n < 0) return 40;\n      return Math.round(n * 4) / 4;\n    }\n\n    function dailySollFromWeekly(){\n      const weekly = settings ? normalizeWeeklySollHours(settings.weeklySollHours) : 40;\n      return Math.round((weekly / 5) * 100) / 100;\n    }",
'weeklySoll Normalisierer');

      // JS: Settings laden.
      html = mustReplace(html,
"      const vacationPerYear = await AZDB.getSetting('vacationPerYear', 30);\n      const useYearSummaryMonthly = await AZDB.getSetting('useYearSummaryMonthly', true);",
"      const vacationPerYear = await AZDB.getSetting('vacationPerYear', 30);\n      const weeklySollHours = await AZDB.getSetting('weeklySollHours', 40);\n      const useYearSummaryMonthly = await AZDB.getSetting('useYearSummaryMonthly', true);",
'weeklySoll laden');
      html = mustReplace(html,
"      settings = { company, person, state, assumption: !!assumption, augsburg: !!augsburg, vacationPerYear: parseInt(vacationPerYear,10) || 30, useYearSummaryMonthly: !!useYearSummaryMonthly };",
"      settings = { company, person, state, assumption: !!assumption, augsburg: !!augsburg, vacationPerYear: parseInt(vacationPerYear,10) || 30, weeklySollHours: normalizeWeeklySollHours(weeklySollHours), useYearSummaryMonthly: !!useYearSummaryMonthly };",
'weeklySoll in settings');

      // JS: Settings speichern.
      html = mustReplace(html,
"      settings.vacationPerYear = parseInt($setVacationPerYear.value,10) || 30;\n      settings.useYearSummaryMonthly = $setUseYearSummaryMonthly ? !!$setUseYearSummaryMonthly.checked : true;",
"      settings.vacationPerYear = parseInt($setVacationPerYear.value,10) || 30;\n      settings.weeklySollHours = normalizeWeeklySollHours($setWeeklySollHours ? $setWeeklySollHours.value : 40);\n      settings.useYearSummaryMonthly = $setUseYearSummaryMonthly ? !!$setUseYearSummaryMonthly.checked : true;",
'weeklySoll speichern state');
      html = mustReplace(html,
"      await AZDB.setSetting('vacationPerYear', settings.vacationPerYear);\n      await AZDB.setSetting('useYearSummaryMonthly', settings.useYearSummaryMonthly);",
"      await AZDB.setSetting('vacationPerYear', settings.vacationPerYear);\n      await AZDB.setSetting('weeklySollHours', settings.weeklySollHours);\n      await AZDB.setSetting('useYearSummaryMonthly', settings.useYearSummaryMonthly);",
'weeklySoll speichern DB');

      // JS: Settings öffnen.
      html = mustReplace(html,
"      $setVacationPerYear.value = settings.vacationPerYear;\n      if($setUseYearSummaryMonthly) $setUseYearSummaryMonthly.checked = !!settings.useYearSummaryMonthly;",
"      $setVacationPerYear.value = settings.vacationPerYear;\n      if($setWeeklySollHours) $setWeeklySollHours.value = normalizeWeeklySollHours(settings.weeklySollHours);\n      if($setUseYearSummaryMonthly) $setUseYearSummaryMonthly.checked = !!settings.useYearSummaryMonthly;",
'weeklySoll Feld füllen');

      // JS: Basis-Soll dynamisch machen.
      html = mustReplace(html,
"    function baseSollHours(key){\n      return isWeekend(key) ? 0 : 8;\n    }",
"    function baseSollHours(key){\n      return isWeekend(key) ? 0 : dailySollFromWeekly();\n    }",
'dynamisches Tages-Soll');

      // JS: DEV Cache-Reset auf DEV-Caches begrenzen, damit die Root-App nicht beeinflusst wird.
      html = mustReplace(html,
"          for(const k of keys) await caches.delete(k);",
"          for(const k of keys){\n            if(String(k).startsWith('azdev-pwa-')) await caches.delete(k);\n          }",
'DEV Cache Reset begrenzen');

      // JS: deutliche Update-Meldung beim Öffnen.
      html = mustReplace(html,
"    async function checkUpdate(){",
"    function showStrongUpdateNotice(version, build){\n      try{\n        if(document.getElementById('azUpdateOverlay')) return;\n        const overlay = document.createElement('div');\n        overlay.id = 'azUpdateOverlay';\n        overlay.className = 'az-update-overlay';\n        overlay.innerHTML = `<div class=\"az-update-card\"><h2>Update verfügbar</h2><p><b>Neue Version:</b> ${version || 'unbekannt'} ${build ? '('+build+')' : ''}</p><p>Bitte erstelle bei wichtigen Daten kurz ein JSON-Backup und lade danach das Update. Wenn mehrere Updates verpasst wurden, wird direkt die neueste Version geladen.</p><div class=\"az-update-actions\"><button class=\"az-update-primary\" id=\"azUpdateNow\">Update jetzt laden</button><button class=\"az-update-muted\" id=\"azUpdateLater\">Später</button></div></div>`;\n        document.body.appendChild(overlay);\n        const nowBtn = document.getElementById('azUpdateNow');\n        const laterBtn = document.getElementById('azUpdateLater');\n        if(nowBtn) nowBtn.onclick = updateNow;\n        if(laterBtn) laterBtn.onclick = ()=>overlay.remove();\n      }catch(_e){}\n    }\n\n    async function checkUpdate(){",
'Update Notice Helper');
      html = mustReplace(html,
"          toast(\"Update verfügbar\");\n          // trigger SW update",
"          toast(\"Update verfügbar\");\n          showStrongUpdateNotice(v.version, v.build);\n          // trigger SW update",
'Update Notice auslösen');
      html = mustReplace(html,
"      setTimeout(()=>{ maybeBackupReminder(); }, 600);",
"      setTimeout(()=>{ maybeBackupReminder(); }, 600);\n      setTimeout(()=>{ try{ checkUpdate(); }catch(_e){} }, 1500);",
'Auto Update Check beim Start');

      // JS: Backup enthält neue Einstellung, alte Backups ohne Feld bleiben kompatibel.
      html = mustReplace(html,
"          vacationPerYear: settings.vacationPerYear\n        },",
"          vacationPerYear: settings.vacationPerYear,\n          weeklySollHours: normalizeWeeklySollHours(settings.weeklySollHours)\n        },",
'Backup weeklySoll export');
      html = mustReplace(html,
"        await AZDB.setSetting('vacationPerYear', data.settings.vacationPerYear ?? 30);",
"        await AZDB.setSetting('vacationPerYear', data.settings.vacationPerYear ?? 30);\n        await AZDB.setSetting('weeklySollHours', normalizeWeeklySollHours(data.settings.weeklySollHours ?? 40));",
'Restore weeklySoll Import');

      document.open();
      document.write(html);
      document.close();
    }catch(e){
      err.textContent = e && e.stack ? e.stack : String(e);
    }
  })();
  </script>
</body>
</html>
